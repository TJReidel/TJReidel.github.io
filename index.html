<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#f7f4ef"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="PillPlan"/>

<link rel="apple-touch-icon" href="icon.png"/>
<title>PillPlan 1.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --cream:#f7f4ef;--cream2:#f0ebe2;--ink:#1a1612;--ink2:#4a4540;--ink3:#8a8480;
  --teal:#2a7c74;--teal2:#3a9e94;--teal-bg:#e8f4f3;
  --red:#c0392b;--red-bg:#fdf0ee;--gold:#b08d57;--gold-bg:#fdf8f0;
  --r:18px;--r2:24px;--shadow:0 2px 16px rgba(26,22,18,.08);
}
html{font-size:16px;background:var(--cream)}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
input{font-family:inherit;outline:none}
[dir="rtl"] .header-row,[dir="rtl"] .progress-card,[dir="rtl"] .dose-card,
[dir="rtl"] .settings-row,[dir="rtl"] .plan-med-header,[dir="rtl"] .next-banner,
[dir="rtl"] .streak-row,[dir="rtl"] .qr-row,[dir="rtl"] .time-fields{flex-direction:row-reverse}
[dir="rtl"] .dose-name,[dir="rtl"] .section-label,[dir="rtl"] .form-label,
[dir="rtl"] .settings-row-label{text-align:right}
[dir="rtl"] .form-input{text-align:right;direction:rtl}
#app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:calc(72px + env(safe-area-inset-bottom))}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--teal);color:#fff;padding:12px 28px;border-radius:100px;font-size:15px;font-weight:600;z-index:9999;box-shadow:0 8px 32px rgba(42,124,116,.35);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.header{padding:calc(env(safe-area-inset-top) + 24px) 20px 0;background:var(--cream);position:sticky;top:0;z-index:50}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.logo{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:var(--teal);letter-spacing:-.5px}
.logo span{color:var(--gold)}
.date-chip{background:var(--cream2);border-radius:100px;padding:6px 14px;font-size:13px;color:var(--ink2);font-weight:500;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.progress-card{background:linear-gradient(135deg,var(--teal) 0%,#1d5c56 100%);border-radius:var(--r2);padding:22px 24px;margin:0 20px 16px;color:#fff;display:flex;align-items:center;gap:20px;box-shadow:0 8px 32px rgba(42,124,116,.3);position:relative;overflow:hidden}
.progress-card::before{content:'';position:absolute;top:-30px;right:-30px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.06)}
.ring-wrap{position:relative;width:72px;height:72px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-track{fill:none;stroke:rgba(255,255,255,.2);stroke-width:6}
.ring-fill{fill:none;stroke:#fff;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)}
.ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
.progress-info{flex:1}
.progress-title{font-family:'Fraunces',serif;font-size:18px;font-weight:700;margin-bottom:4px}
.progress-sub{font-size:13px;opacity:.75;margin-bottom:12px}
.streak-row{display:flex;align-items:center;gap:6px}
.streak-badge{background:rgba(255,255,255,.15);border-radius:100px;padding:4px 12px;font-size:13px;font-weight:600}
.period-selector{display:flex;gap:6px;padding:0 20px 12px;flex-wrap:nowrap}
.period-btn{flex:1;padding:8px 4px;border-radius:12px;border:2px solid var(--cream2);background:#fff;font-size:12px;font-weight:700;color:var(--ink2);cursor:pointer;transition:all .2s;text-align:center;font-family:inherit}
.period-btn.active{background:var(--teal);color:#fff;border-color:var(--teal);box-shadow:0 4px 12px rgba(42,124,116,.25)}
.tabs{display:flex;gap:6px;padding:0 20px 16px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:9px 18px;border-radius:100px;font-size:14px;font-weight:600;background:var(--cream2);color:var(--ink2);transition:all .2s;border:2px solid transparent}
.tab.active{background:var(--teal);color:#fff;box-shadow:0 4px 14px rgba(42,124,116,.3)}
.content{padding:0 20px;flex:1}
.section-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin:4px 0 12px}
.dose-card{background:#fff;border-radius:var(--r2);padding:18px 20px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;border:2px solid transparent;transition:all .25s}
.dose-card.done{background:var(--teal-bg);border-color:rgba(42,124,116,.2)}
.dose-card.overdue{border-color:rgba(192,57,43,.2);background:var(--red-bg)}
.dose-icon{width:48px;height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.dose-body{flex:1;min-width:0}
.dose-name{font-weight:700;font-size:16px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dose-time{font-size:13px;color:var(--ink2)}
.dose-status{font-size:12px;font-weight:600;margin-top:4px}
.dose-status.done{color:var(--teal)}
.dose-status.pending{color:var(--ink3)}
.dose-status.overdue{color:var(--red)}
.check-btn{width:48px;height:48px;border-radius:16px;flex-shrink:0;font-size:22px;transition:all .2s;display:flex;align-items:center;justify-content:center}
.check-btn-off{background:var(--cream2);color:var(--ink3)}
.check-btn-on{background:var(--teal);color:#fff;box-shadow:0 4px 14px rgba(42,124,116,.35)}
.next-banner{background:var(--gold-bg);border:1.5px solid rgba(176,141,87,.3);border-radius:var(--r);padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.next-banner-text{font-size:14px;font-weight:600;color:var(--gold)}
.next-banner-sub{font-size:13px;color:var(--ink2);margin-top:2px}
.mhd-banner{background:#fff8ee;border:1.5px solid rgba(176,100,30,.25);border-radius:var(--r);padding:14px 18px;margin-bottom:14px;display:flex;align-items:flex-start;gap:12px}
.mhd-text{font-size:13px;color:var(--ink2);line-height:1.5}
.disclaimer{background:var(--teal-bg);border:1.5px solid rgba(42,124,116,.2);border-radius:var(--r);padding:14px 18px;margin:14px 0 8px;display:flex;align-items:flex-start;gap:10px}
.disclaimer-text{font-size:13px;color:var(--ink2);line-height:1.55}
.all-done{text-align:center;padding:20px 0 8px;animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
.all-done-icon{font-size:48px;margin-bottom:8px}
.all-done-text{font-family:'Fraunces',serif;font-size:22px;color:var(--teal)}
.all-done-sub{font-size:14px;color:var(--ink3);margin-top:4px}
.empty{text-align:center;padding:48px 0}
.empty-icon{font-size:52px;margin-bottom:16px}
.empty-text{font-size:16px;color:var(--ink2);margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--ink3);margin-bottom:24px}
.plan-med{margin-bottom:24px}
.plan-med-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.plan-med-name{font-weight:700;font-size:16px;display:flex;align-items:center;gap:10px}
.color-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.plan-med-time{font-size:12px;color:var(--ink3)}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day-cell{aspect-ratio:1;border-radius:12px;border:2px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;transition:all .18s;background:var(--cream2)}
.day-cell.today{border-color:var(--teal)}
.day-cell.done{background:var(--teal)}
.day-cell.partial{background:var(--teal-bg);border-color:var(--teal)}
.day-cell.past{opacity:.5}
.day-wd{font-size:8px;font-weight:700;text-transform:uppercase;opacity:.7}
.day-num{font-size:13px;font-weight:800}
.day-ico{font-size:9px}
.day-cell.done .day-wd,.day-cell.done .day-num,.day-cell.done .day-ico{color:#fff}
.plan-divider{height:1px;background:var(--cream2);margin:20px 0}
.qr-banner{background:var(--teal-bg);border:1.5px solid rgba(42,124,116,.25);border-radius:var(--r);padding:16px;margin-bottom:20px}
.qr-banner-title{font-size:14px;font-weight:700;color:var(--teal);margin-bottom:10px}
.qr-row{display:flex;gap:8px}
.form-label{font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ink2);display:block;margin:20px 0 8px}
.form-input{width:100%;background:#fff;border:2px solid var(--cream2);border-radius:var(--r);padding:15px 18px;font-size:16px;color:var(--ink);transition:border-color .2s}
.form-input:focus{border-color:var(--teal)}
.form-input::placeholder{color:#bbb}
.time-fields{display:flex;gap:10px;flex-wrap:wrap}
.time-field{flex:1;min-width:120px}
.time-optional{font-size:11px;color:var(--ink3);margin-top:4px}
.colors-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.color-btn{width:38px;height:38px;border-radius:50%;border:3px solid transparent;transition:all .15s}
.color-btn.sel{border-color:var(--ink);transform:scale(1.15)}
.preview-card{background:#fff;border:2px solid var(--cream2);border-radius:var(--r);padding:14px 18px;margin:18px 0 4px;display:flex;align-items:center;gap:12px}
.btn-primary{width:100%;background:var(--teal);color:#fff;border-radius:var(--r);padding:17px;font-size:16px;font-weight:700;margin-top:22px;box-shadow:0 8px 24px rgba(42,124,116,.3);transition:all .2s}
.btn-primary:active{transform:scale(.98)}
.btn-secondary{width:100%;background:var(--cream2);color:var(--ink2);border-radius:var(--r);padding:14px;font-size:15px;font-weight:600;margin-top:10px;cursor:pointer;font-family:inherit}
.qr-apply-btn{background:var(--teal);color:#fff;border-radius:12px;padding:0 18px;font-size:14px;font-weight:700;flex-shrink:0}
.voice-btn{width:48px;height:48px;border-radius:14px;background:var(--cream2);color:var(--ink2);font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;border:2px solid transparent;cursor:pointer}
.qr-scanner-wrap{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.qr-scanner-wrap video{width:min(90vw,380px);height:min(90vw,380px);object-fit:cover;border-radius:20px;border:3px solid var(--teal)}
.qr-scanner-frame{position:relative;width:min(90vw,380px);height:min(90vw,380px)}
.qr-scanner-frame video{width:100%;height:100%;object-fit:cover;border-radius:20px;border:3px solid var(--teal)}
.qr-corner{position:absolute;width:32px;height:32px;border-color:var(--teal2);border-style:solid}
.qr-corner.tl{top:8px;left:8px;border-width:4px 0 0 4px;border-radius:6px 0 0 0}
.qr-corner.tr{top:8px;right:8px;border-width:4px 4px 0 0;border-radius:0 6px 0 0}
.qr-corner.bl{bottom:8px;left:8px;border-width:0 0 4px 4px;border-radius:0 0 0 6px}
.qr-corner.br{bottom:8px;right:8px;border-width:0 4px 4px 0;border-radius:0 0 6px 0}
.qr-hint{color:#fff;font-size:15px;font-weight:600;text-align:center;max-width:320px;line-height:1.5}
.qr-close-btn{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:14px;padding:13px 32px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.voice-btn.listening{background:var(--red);color:#fff;animation:pulse 1s infinite}
.voice-btn.unsupported{opacity:.35;cursor:not-allowed}
.print-btn{width:100%;background:#fff;border:1.5px solid var(--cream2);border-radius:var(--r);padding:14px;font-size:15px;font-weight:600;color:var(--ink2);margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;font-family:inherit;transition:all .2s}
.edit-btn{background:var(--teal-bg);color:var(--teal);border-radius:10px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border:1px solid rgba(42,124,116,.2)}
.share-btn{width:100%;background:var(--teal-bg);border:1.5px solid rgba(42,124,116,.25);border-radius:var(--r);padding:14px;font-size:15px;font-weight:700;color:var(--teal);margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;font-family:inherit;transition:all .2s}
.share-options{display:none;flex-direction:column;gap:8px;margin-top:10px}
.share-options.open{display:flex}
.share-option{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:var(--r);background:#fff;border:1.5px solid var(--cream2);font-size:14px;font-weight:600;color:var(--ink2);cursor:pointer;font-family:inherit;width:100%;text-align:left}
.settings-section{margin-bottom:28px}
.settings-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:12px}
.settings-card{background:#fff;border-radius:var(--r2);overflow:hidden;box-shadow:var(--shadow)}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--cream2)}
.settings-row:last-child{border-bottom:none}
.settings-row-label{font-size:15px;font-weight:600}
.settings-row-sub{font-size:12px;color:var(--ink3);margin-top:2px}
.settings-action{background:var(--teal-bg);color:var(--teal);border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.settings-action.danger{background:var(--red-bg);color:var(--red)}
.lang-grid{display:flex;flex-wrap:wrap;gap:8px;padding:16px 20px}
.lang-btn{padding:8px 14px;border-radius:12px;font-size:13px;font-weight:600;transition:all .15s;cursor:pointer;font-family:inherit;border:none}
.lang-btn.sel{background:var(--teal);color:#fff}
.lang-btn:not(.sel){background:var(--cream2);color:var(--ink2)}
.install-card{background:linear-gradient(135deg,var(--teal-bg),var(--gold-bg));border:1.5px solid rgba(42,124,116,.2);border-radius:var(--r2);padding:20px;margin-bottom:20px}
.install-card-title{font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:var(--teal);margin-bottom:6px}
.install-card-text{font-size:14px;color:var(--ink2);margin-bottom:16px;line-height:1.5}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(247,244,239,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(26,22,18,.07);display:flex;padding:10px 0 calc(10px + env(safe-area-inset-bottom));z-index:100}
.nav-btn{flex:1;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;color:var(--ink3);font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;transition:color .2s;cursor:pointer;border:none;font-family:inherit}
.nav-btn.active{color:var(--teal)}
.nav-icon{font-size:22px;line-height:1}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.anim-up{animation:slideUp .35s cubic-bezier(.4,0,.2,1) both}
input[type="time"]::-webkit-calendar-picker-indicator{opacity:.5}
@media print{
  .header,.bottom-nav,.tabs,.period-selector,.check-btn,.next-banner,.print-btn,.share-btn,.share-options,.disclaimer,.bottom-nav{display:none!important}
  body{background:#fff;color:#000}
  .dose-card{box-shadow:none;border:1px solid #ccc;break-inside:avoid}
}
</style>
</head>

// ── State ──────────────────────────────────────────────────
var KEY = "pillplan_v4";
var S = {
  lang: (function() {
    var keys = Object.keys(LANGS);
    for (var i = 0; i < keys.length; i++) {
      if (navigator.language && navigator.language.startsWith(keys[i])) return keys[i];
    }
    return "de";
  })(),
  meds: [
    {id:1, name:"Metformin 500 mg", times:["08:00","20:00"], color:"#2a7c74"},
    {id:2, name:"Lisinopril 10 mg", times:["08:00"],         color:"#c0392b"}
  ],
  taken: {},
  screen: "today",
  notif: false,
  period: 14
};

try {
  var raw = localStorage.getItem(KEY);
  if (raw) {
    var saved = JSON.parse(raw);
    S.lang   = saved.lang   || S.lang;
    S.meds   = saved.meds   || S.meds;
    S.taken  = saved.taken  || S.taken;
    S.screen = saved.screen || S.screen;
    S.notif  = saved.notif  || S.notif;
    S.period = saved.period || S.period;
  }
} catch(e) {}

function persist() {
  try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e) {}
}

// ── Helpers ────────────────────────────────────────────────
function tr(k) {
  var lang = T[S.lang] || T.de;
  return lang[k] || k;
}
function today() { return new Date().toISOString().split("T")[0]; }
function getDays() {
  var days = [];
  for (var i = 0; i < S.period; i++) {
    var d = new Date();
    d.setDate(d.getDate() + i);
    days.push(d.toISOString().split("T")[0]);
  }
  return days;
}
function isDone(mid, date, time) { return !!S.taken[date + "_" + mid + "_" + time]; }
function allDoneDay(m, d) {
  for (var i = 0; i < m.times.length; i++) {
    if (!isDone(m.id, d, m.times[i])) return false;
  }
  return true;
}
function todayStats() {
  var td = today(); var tot = 0; var dn = 0;
  for (var i = 0; i < S.meds.length; i++) {
    var m = S.meds[i];
    tot += m.times.length;
    for (var j = 0; j < m.times.length; j++) {
      if (isDone(m.id, td, m.times[j])) dn++;
    }
  }
  return {tot:tot, dn:dn, pct: tot ? Math.round(dn/tot*100) : 0};
}
function overallStats() {
  var days = getDays().filter(function(d){ return d <= today(); });
  var tot = 0; var dn = 0;
  for (var i = 0; i < S.meds.length; i++) {
    var m = S.meds[i];
    for (var j = 0; j < days.length; j++) {
      tot += m.times.length;
      for (var k = 0; k < m.times.length; k++) {
        if (isDone(m.id, days[j], m.times[k])) dn++;
      }
    }
  }
  return {tot:tot, dn:dn, pct: tot ? Math.round(dn/tot*100) : 0};
}
function calcStreak() {
  if (!S.meds.length) return 0;
  var streak = 0;
  var days = getDays();
  var td = today();
  for (var i = 0; i < days.length; i++) {
    var d = days[i];
    if (d > td) break;
    if (S.meds.every(function(m){ return allDoneDay(m, d); })) streak++;
    else if (d < td) streak = 0;
  }
  return streak;
}
function nextDose() {
  var td = today();
  var now = new Date();
  var nm = now.getHours()*60 + now.getMinutes();
  var best = null;
  for (var i = 0; i < S.meds.length; i++) {
    var m = S.meds[i];
    for (var j = 0; j < m.times.length; j++) {
      var ti = m.times[j];
      if (isDone(m.id, td, ti)) continue;
      var parts = ti.split(":");
      var mins = parseInt(parts[0])*60 + parseInt(parts[1]);
      if (mins >= nm && (!best || mins < best.mins)) best = {m:m, ti:ti, mins:mins};
    }
  }
  return best;
}
function isOverdue(time) {
  var now = new Date();
  var nm = now.getHours()*60 + now.getMinutes();
  var parts = time.split(":");
  return parseInt(parts[0])*60 + parseInt(parts[1]) < nm;
}
function fmtDate(ds) {
  var d = new Date(ds + "T00:00:00");
  var locale = (LANGS[S.lang] && LANGS[S.lang].locale) || "de-DE";
  try { return d.toLocaleDateString(locale, {weekday:"long",day:"numeric",month:"long"}); }
  catch(e) { return d.toLocaleDateString("de-DE", {weekday:"long",day:"numeric",month:"long"}); }
}
function fmtDayShort(ds) {
  var d = new Date(ds + "T00:00:00");
  var locale = (LANGS[S.lang] && LANGS[S.lang].locale) || "de-DE";
  try { return d.toLocaleDateString(locale, {weekday:"short"}).slice(0,2); }
  catch(e) { return d.toLocaleDateString("de-DE", {weekday:"short"}).slice(0,2); }
}
function applyLang() {
  var dir = (LANGS[S.lang] && LANGS[S.lang].dir) || "ltr";
  document.documentElement.lang = S.lang;
  document.documentElement.dir  = dir;
}

// ── Toast ──────────────────────────────────────────────────
var toastTimer;
function showToast(msg) {
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove("show"); }, 2400);
}

// ── Notifications ──────────────────────────────────────────
var ntTimers = {};
function requestNotif() {
  if (!("Notification" in window)) { showToast(tr("notifDenied")); return; }
  Notification.requestPermission().then(function(p) {
    S.notif = (p === "granted");
    persist(); render();
    if (S.notif) { scheduleNotifs(); showToast(tr("notifOn")); }
    else showToast(tr("notifDenied"));
  });
}
function scheduleNotifs() {
  var keys = Object.keys(ntTimers);
  for (var i = 0; i < keys.length; i++) clearTimeout(ntTimers[keys[i]]);
  ntTimers = {};
  if (!S.notif) return;
  for (var i = 0; i < S.meds.length; i++) {
    (function(m) {
      for (var j = 0; j < m.times.length; j++) {
        (function(time) {
          var parts = time.split(":");
          var next = new Date();
          next.setHours(parseInt(parts[0]), parseInt(parts[1]), 0, 0);
          if (next <= new Date()) next.setDate(next.getDate() + 1);
          var id = setTimeout(function() {
            new Notification("💊 PillPlan", {
              body: (S.lang==="de" ? "Bitte denken Sie an Ihre Einnahme: " : S.lang==="ar" ? "يرجى تذكر تناول دوائك: " : "Please remember to take your medication: ") + m.name + " (" + time + ")",
              icon: "icon.png",
              tag: "pp-" + m.id + "-" + time
            });
            setTimeout(scheduleNotifs, 1000);
          }, next - new Date());
          ntTimers[m.id + "_" + time] = id;
        })(m.times[j]);
      }
    })(S.meds[i]);
  }
}

function buildShareText() {
  var td = today();
  var days = getDays().filter(function(d){ return d <= td; });
  var lines = [];
  lines.push("💊 " + tr("shareTitle"));
  lines.push("📅 " + new Date().toLocaleDateString());
  lines.push("");
  for (var i = 0; i < S.meds.length; i++) {
    var m = S.meds[i];
    var done = 0;
    for (var j = 0; j < days.length; j++) {
      if (allDoneDay(m, days[j])) done++;
    }
    var pct = days.length ? Math.round(done/days.length*100) : 0;
    lines.push("• " + m.name + ": " + pct + "% (" + done + "/" + days.length + ")");
    lines.push("  " + m.times.join(" · ") + " Uhr");
  }
  lines.push("");
  lines.push("— PillPlan");
  return lines.join("\n");
}
function doShare() {
  var text = buildShareText();
  var url  = window.location.href;
  if (navigator.share) {
    navigator.share({title: tr("shareTitle"), text: text, url: url}).catch(function(){});
  } else {
    var el = document.getElementById("share-options");
    if (el) el.classList.toggle("open");
  }
}
function shareVia(method) {
  var text = buildShareText();
  var url  = window.location.href;
  if (method === "whatsapp") {
    window.open("https://wa.me/?text=" + encodeURIComponent(text + "\n" + url), "_blank");
  } else if (method === "mail") {
    window.location.href = "mailto:?subject=" + encodeURIComponent(tr("shareTitle")) + "&body=" + encodeURIComponent(text);
  } else if (method === "copy") {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function(){ showToast(tr("shareCopied")); });
    } else {
      var el = document.createElement("textarea");
      el.value = text; document.body.appendChild(el);
      el.select(); document.execCommand("copy");
      document.body.removeChild(el);
      showToast(tr("shareCopied"));
    }
  }
}

// ── QR Scanner (iOS + Android kompatibel via jsQR) ────────
var qrStream = null;
var qrInterval = null;
var jsQRLoaded = false;

function loadJsQR(cb) {
  if (jsQRLoaded) { cb(); return; }
  var s = document.createElement("script");
  s.src = "https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js";
  s.onload = function() { jsQRLoaded = true; cb(); };
  s.onerror = function() { showToast(tr("qrScanError")); };
  document.head.appendChild(s);
}

function openQRScanner() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showToast(tr("qrScanError")); return;
  }
  loadJsQR(function() {
    var overlay = document.createElement("div");
    overlay.className = "qr-scanner-wrap";
    overlay.id = "qr-overlay";
    overlay.innerHTML =
      '<div class="qr-scanner-frame">' +
        '<video id="qr-video" autoplay playsinline muted style="width:100%;height:100%;object-fit:cover;border-radius:16px"></video>' +
        '<canvas id="qr-canvas" style="display:none"></canvas>' +
        '<div class="qr-corner tl"></div><div class="qr-corner tr"></div>' +
        '<div class="qr-corner bl"></div><div class="qr-corner br"></div>' +
      '</div>' +
      '<div class="qr-hint">' + tr("qrScanHint") + '</div>' +
      '<button class="qr-close-btn" id="qr-close-btn">' + tr("qrScanClose") + '</button>';
    document.body.appendChild(overlay);
    document.getElementById("qr-close-btn").addEventListener("click", closeQRScanner);

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 640, height: 640 } })
      .then(function(stream) {
        qrStream = stream;
        var video = document.getElementById("qr-video");
        if (!video) return;
        video.srcObject = stream;
        video.setAttribute("playsinline", true);
        video.play();
        var canvas = document.getElementById("qr-canvas");
        var ctx = canvas ? canvas.getContext("2d") : null;
        qrInterval = setInterval(function() {
          if (!video || video.readyState !== video.HAVE_ENOUGH_DATA) return;
          if (!canvas || !ctx) return;
          canvas.width  = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          var code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
          if (code && code.data) {
            closeQRScanner();
            applyQRResult(code.data);
          }
        }, 300);
      })
      .catch(function() { closeQRScanner(); showToast(tr("qrScanError")); });
  });
}

function closeQRScanner() {
  clearInterval(qrInterval);
  if (qrStream) { qrStream.getTracks().forEach(function(t) { t.stop(); }); qrStream = null; }
  var ol = document.getElementById("qr-overlay");
  if (ol) ol.remove();
}

function applyQRResult(val) {
  var name = val.replace(/https?:\/\/[^ ]+/g, "").trim() || val;
  syncF(); F.name = name;
  var inp = document.getElementById("add-name");
  if (inp) inp.value = name;
  var pv = document.getElementById("add-preview");
  var pn = document.getElementById("prev-name");
  if (pv) pv.style.display = "block";
  if (pn) pn.textContent = name;
  showToast(tr("qrScanSuccess"));
}

var VOICE_LANG = {de:"de-DE",en:"en-GB",fr:"fr-FR",es:"es-ES",it:"it-IT",tr:"tr-TR",ar:"ar-SA",ru:"ru-RU",pt:"pt-BR"};

function startVoice() {
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (voiceActive) return;
  voiceActive = true;
  var vb = document.getElementById("voice-btn");

  showToast(tr("voiceListen"));
  var r = new SR();
  r.lang = VOICE_LANG[S.lang] || "de-DE";
  r.interimResults = false;
  r.maxAlternatives = 1;
  r.onresult = function(e) {
    var txt = e.results[0][0].transcript.trim();
    var inp = document.getElementById("add-name");
    if (inp) { inp.value = txt; syncF(); F.name = txt; }
    var pv = document.getElementById("add-preview");

  };
  r.onerror = function() {

  };
  r.onend = function() {

    if (vb) vb.classList.remove("listening");
  };
  r.start();
}

  return html;
}

// ── Events ─────────────────────────────────────────────────
function bindEvents() {
  var root = document.getElementById("app");

  root.addEventListener("click", function(e) {
    var nav = e.target.closest("[data-nav]");
    if (nav) { S.screen = nav.dataset.nav; persist(); render(); return; }

    var per = e.target.closest("[data-period]");
    if (per) { S.period = parseInt(per.dataset.period); persist(); render(); return; }

    var tog = e.target.closest("[data-toggle]");
    if (tog) {
      tog.style.pointerEvents = "none";
      var mid = tog.dataset.toggle; var time = tog.dataset.time; var date = tog.dataset.date;
      var k = date + "_" + mid + "_" + time;
      S.taken[k] = !S.taken[k];
      if (S.taken[k]) showToast(tr("taken"));
      persist(); render(); return;
    }
    var tod = e.target.closest("[data-toggle-day]");
    if (tod) {
      var mid2 = parseInt(tod.dataset.toggleDay); var date2 = tod.dataset.date;
      var m2 = null;
      for (var i = 0; i < S.meds.length; i++) { if (S.meds[i].id === mid2) { m2 = S.meds[i]; break; } }
      if (!m2) return;
      var done3 = allDoneDay(m2, date2);
      for (var j = 0; j < m2.times.length; j++) { S.taken[date2 + "_" + mid2 + "_" + m2.times[j]] = !done3; }
      if (!done3) showToast(tr("taken"));
      persist(); render(); return;
    }
    var ed = e.target.closest("[data-edit]");
    if (ed) {
      var eid = parseInt(ed.dataset.edit);
      var em = S.meds.find(function(m){ return m.id === eid; });
      if (!em) return;
      F.name  = em.name;
      F.time1 = em.times[0] || "08:00";
      F.time2 = em.times[1] || "";
      F.time3 = em.times[2] || "";
      F.time4 = em.times[3] || "";
      F.color = em.color;
      F.editId = eid;
      S.screen = "add"; persist(); render();
      showToast(S.lang==="de"?"Medikament bearbeiten":"Edit medication");
      return;
    }
    var rm = e.target.closest("[data-remove]");
    if (rm) {
      var rid = parseInt(rm.dataset.remove);
      S.meds = S.meds.filter(function(m){ return m.id !== rid; });
      showToast(tr("removed")); persist(); render(); return;
    }
    var col = e.target.closest("[data-color]");
    if (col) { syncF(); F.color = col.dataset.color; render(); return; }
    var lb = e.target.closest("[data-lang]");
    if (lb) { S.lang = lb.dataset.lang; persist(); render(); return; }

    var nb = document.getElementById("notif-btn");
    if (nb && nb.contains(e.target)) { S.notif ? testNotif() : requestNotif(); return; }
    var ib = document.getElementById("install-btn");
    if (ib && ib.contains(e.target)) { installApp(); return; }
    var rb = document.getElementById("reset-btn");
    if (rb && rb.contains(e.target)) {
      if (confirm(tr("resetConfirm"))) { S.meds = []; S.taken = {}; persist(); render(); showToast("Reset"); }
      return;
    }
    var qa = document.getElementById("qr-ok");
    if (qa && qa.contains(e.target)) {
      var qr = document.getElementById("qr-in");
      if (qr && qr.value.trim()) { syncF(); F.name = qr.value.trim(); render(); showToast(tr("qrApplied")); }
      return;
    }
    var sv = document.getElementById("save-btn");
    if (sv && sv.contains(e.target)) {
      syncF();
      if (!F.name.trim()) { showToast(tr("nameRequired")); return; }
      var times = [F.time1];
      if (F.time2) times.push(F.time2);
      if (F.time3) times.push(F.time3);
      if (F.time4) times.push(F.time4);
      if (F.editId) {
        for (var ei=0;ei<S.meds.length;ei++) {
          if (S.meds[ei].id === F.editId) {
            S.meds[ei].name = F.name.trim();
            S.meds[ei].times = times;
            S.meds[ei].color = F.color;
            break;
          }
        }
      } else {
        S.meds.push({id: Date.now(), name: F.name.trim(), times: times, color: F.color});
      }
      F = {name:"", time1:"08:00", time2:"", time3:"", time4:"", color:"#2a7c74"};
      S.screen = "today"; persist(); render(); showToast(tr("saved")); return;
    }
    var qrsb = document.getElementById("qr-scan-btn");
    if (qrsb && qrsb.contains(e.target)) { openQRScanner(); return; }
    var vb = document.getElementById("voice-btn");
    if (vb && vb.contains(e.target) && !vb.classList.contains("unsupported")) { startVoice(); return; }
    var pb = document.getElementById("print-btn");
    if (pb && pb.contains(e.target)) { window.print(); return; }
    var smb = document.getElementById("share-main-btn");
    if (smb && smb.contains(e.target)) { doShare(); return; }
    var swa = document.getElementById("share-wa");
    if (swa && swa.contains(e.target)) { shareVia("whatsapp"); return; }
    var sml = document.getElementById("share-mail");
    if (sml && sml.contains(e.target)) { shareVia("mail"); return; }
    var scp = document.getElementById("share-copy");
    if (scp && scp.contains(e.target)) { shareVia("copy"); return; }
  });

  var inputs = ["add-name","add-t1","add-t2","add-t3","add-t4"];
  for (var i = 0; i < inputs.length; i++) {
    (function(id) {
      var el = document.getElementById(id);
      if (!el) return;
      el.addEventListener("input", function() {
        syncF();
        var pv = document.getElementById("add-preview");
        var pn = document.getElementById("prev-name");
        var pt = document.getElementById("prev-time");
        var pd = document.getElementById("prev-dot");
        if (pv) pv.style.display = F.name ? "block" : "none";
        if (pn) pn.textContent = F.name;
        var allTimes = [F.time1];
        if (F.time2) allTimes.push(F.time2);
        if (F.time3) allTimes.push(F.time3);
        if (F.time4) allTimes.push(F.time4);
        if (pt) pt.textContent = allTimes.join(" · ");
        if (pd) pd.style.background = F.color;
      });
    })(inputs[i]);
  }
  var qi = document.getElementById("qr-in");
  if (qi) {
    qi.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && qi.value.trim()) {
        syncF(); F.name = qi.value.trim(); render(); showToast(tr("qrApplied"));
      }
    });
  }
}

function syncF() {
  var n  = document.getElementById("add-name");
  var t1 = document.getElementById("add-t1");
  var t2 = document.getElementById("add-t2");
  var t3 = document.getElementById("add-t3");
  var t4 = document.getElementById("add-t4");
  if (n)  F.name  = n.value;
  if (t1) F.time1 = t1.value;
  if (t2) F.time2 = t2.value;
  if (t3) F.time3 = t3.value;
  if (t4) F.time4 = t4.value;
}

if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("sw.js").catch(function(){});
  });
}

render();
</script>
</body>
</html>
